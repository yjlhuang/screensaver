<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>constellation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #050608;
    cursor: none;
  }
  body {
    background: radial-gradient(ellipse at 30% 40%, #0a0e1a 0%, #050608 70%, #020203 100%);
  }
  #sky {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    display: block;
  }
  #phrase-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #phrase {
    font-family: 'Georgia', 'Times New Roman', 'Noto Serif TC', serif;
    font-size: 19px;
    color: rgba(220, 225, 240, 0);
    letter-spacing: 0.04em;
    line-height: 1.7;
    text-align: center;
    max-width: 640px;
    padding: 0 2rem;
    font-style: italic;
    transition: color 3.5s ease-in-out;
  }
  #exit-hint {
    position: fixed;
    bottom: 20px;
    right: 24px;
    font-family: 'Georgia', serif;
    font-size: 11px;
    color: rgba(180, 190, 210, 0.25);
    letter-spacing: 0.05em;
    pointer-events: none;
    transition: opacity 2s;
  }
  #exit-hint.faded {
    opacity: 0;
  }
</style>
</head>
<body>
<canvas id="sky"></canvas>
<div id="phrase-layer"><div id="phrase"></div></div>
<div id="exit-hint">esc · 點兩下螢幕 to exit</div>

<script>
(function() {
  const canvas = document.getElementById('sky');
  const ctx = canvas.getContext('2d');
  const phraseEl = document.getElementById('phrase');
  const exitHint = document.getElementById('exit-hint');
  
  let W, H;
  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * window.devicePixelRatio;
    canvas.height = H * window.devicePixelRatio;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  }
  resize();
  window.addEventListener('resize', resize);
  
  // fade exit hint after 6 seconds
  setTimeout(() => exitHint.classList.add('faded'), 6000);
  
  // exit handlers
  function exit() {
    if (document.fullscreenElement) {
      document.exitFullscreen();
    }
    window.close();
    // if window.close() doesn't work (browser blocks it), at least leave fullscreen
  }
  
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') exit();
  });
  
  let lastClick = 0;
  document.addEventListener('click', () => {
    const now = Date.now();
    if (now - lastClick < 400) {
      exit();
    }
    lastClick = now;
    // also re-show exit hint briefly when clicked
    exitHint.classList.remove('faded');
    setTimeout(() => exitHint.classList.add('faded'), 4000);
  });
  
  // try to enter fullscreen on first click
  let fullscreenAttempted = false;
  document.addEventListener('click', () => {
    if (!fullscreenAttempted) {
      fullscreenAttempted = true;
      document.documentElement.requestFullscreen?.().catch(() => {});
    }
  }, { once: true });
  
  // stars
  const stars = [];
  const STAR_COUNT = 280;
  const BRIGHT_COUNT = 30;
  
  for (let i = 0; i < STAR_COUNT; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.1,
      vy: (Math.random() - 0.5) * 0.07,
      size: 0.4 + Math.random() * 1.3,
      baseAlpha: 0.3 + Math.random() * 0.55,
      twinkleSpeed: 0.002 + Math.random() * 0.005,
      twinklePhase: Math.random() * Math.PI * 2,
      formingTo: null
    });
  }
  
  for (let i = 0; i < BRIGHT_COUNT; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.04,
      vy: (Math.random() - 0.5) * 0.03,
      size: 1.4 + Math.random() * 1.8,
      baseAlpha: 0.7 + Math.random() * 0.3,
      twinkleSpeed: 0.001 + Math.random() * 0.003,
      twinklePhase: Math.random() * Math.PI * 2,
      formingTo: null
    });
  }
  
  const phrases = [
    "Omnia mutantur, nihil interit.",
    "Memento vivere.",
    "Doe is fine.",
    "Everything will be ok.",
    "Nothing can ever happen twice.",
    "No two kisses are alike, no two glances identical.",
    "Je ne peins pas l'être, je peins le passage.",
    "Pulvis et umbra sumus.",
    "Every moment is the only moment.",
    "Nic dwa razy się nie zdarza.",
    "And never twice the same day.",
    "Nothing stays. Everything happened.",
    "Vivere militare est.",
    "Sub specie aeternitatis.",
    "Each glance is the only glance.",
    "Carpe diem, quam minimum credula postero.",
    "It happened. That is enough.",
    "我們是塵與影。",
    "一切都在流動。",
    "此刻是真的。",
    "彈指之間,山河已老。",
    "Still here.",
    "The stars are rearranging themselves.",
    "Tomorrow is tomorrow.",
    "今天到這裡就好。"
  ];
  
  // shuffle phrases once at start so order is varied
  for (let i = phrases.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [phrases[i], phrases[j]] = [phrases[j], phrases[i]];
  }
  
  let phraseIdx = 0;
  let state = 'drifting';
  let stateTimer = 0;
  let lastFrameTime = performance.now();
  
  function drawStars(time) {
    ctx.clearRect(0, 0, W, H);
    
    for (const s of stars) {
      const twinkle = Math.sin(time * s.twinkleSpeed + s.twinklePhase) * 0.25 + 0.75;
      const alpha = s.baseAlpha * twinkle;
      
      if (state === 'drifting') {
        s.x += s.vx;
        s.y += s.vy;
        if (s.x < -10) s.x = W + 10;
        if (s.x > W + 10) s.x = -10;
        if (s.y < -10) s.y = H + 10;
        if (s.y > H + 10) s.y = -10;
      } else if (state === 'forming' && s.formingTo) {
        const dx = s.formingTo.x - s.x;
        const dy = s.formingTo.y - s.y;
        // slower ease — was 0.025, now 0.012
        s.x += dx * 0.012;
        s.y += dy * 0.012;
      } else if (state === 'dispersing') {
        s.x += s.vx;
        s.y += s.vy;
        if (s.x < -10) s.x = W + 10;
        if (s.x > W + 10) s.x = -10;
        if (s.y < -10) s.y = H + 10;
        if (s.y > H + 10) s.y = -10;
      } else if (state === 'held') {
        s.x += s.vx * 0.15;
        s.y += s.vy * 0.15;
      }
      
      // halo
      const haloAlpha = alpha * 0.25;
      const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.size * 3.5);
      grad.addColorStop(0, 'rgba(220,225,240,' + alpha + ')');
      grad.addColorStop(0.4, 'rgba(180,195,230,' + haloAlpha + ')');
      grad.addColorStop(1, 'rgba(150,170,210,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * 3.5, 0, Math.PI * 2);
      ctx.fill();
      
      // core
      ctx.fillStyle = 'rgba(240,245,255,' + alpha + ')';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * 0.6, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  
  function getTextPoints(text) {
    const measureCanvas = document.createElement('canvas');
    measureCanvas.width = W;
    measureCanvas.height = H;
    const mctx = measureCanvas.getContext('2d');
    
    // larger font on fullscreen, scale by viewport
    const fontSize = Math.min(28, Math.max(18, W / 50));
    mctx.font = "italic " + fontSize + "px Georgia, 'Times New Roman', 'Noto Serif TC', serif";
    mctx.fillStyle = '#fff';
    mctx.textAlign = 'center';
    mctx.textBaseline = 'middle';
    
    const maxWidth = Math.min(W - 120, 800);
    const words = text.split(' ');
    const lines = [];
    let current = '';
    for (const w of words) {
      const test = current ? current + ' ' + w : w;
      if (mctx.measureText(test).width > maxWidth && current) {
        lines.push(current);
        current = w;
      } else {
        current = test;
      }
    }
    if (current) lines.push(current);
    
    const lineHeight = fontSize * 1.6;
    const startY = H / 2 - (lines.length - 1) * lineHeight / 2;
    lines.forEach((line, i) => {
      mctx.fillText(line, W / 2, startY + i * lineHeight);
    });
    
    const imgData = mctx.getImageData(0, 0, W, H);
    const points = [];
    const step = 3;
    for (let y = 0; y < H; y += step) {
      for (let x = 0; x < W; x += step) {
        const idx = (y * W + x) * 4;
        if (imgData.data[idx + 3] > 100) {
          points.push({ x: x + (Math.random() - 0.5) * 2, y: y + (Math.random() - 0.5) * 2 });
        }
      }
    }
    return points;
  }
  
  function startForming() {
    const text = phrases[phraseIdx % phrases.length];
    phraseIdx++;
    const points = getTextPoints(text);
    
    if (points.length === 0) {
      state = 'drifting';
      stateTimer = 0;
      return;
    }
    
    for (let i = points.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [points[i], points[j]] = [points[j], points[i]];
    }
    
    for (let i = 0; i < stars.length; i++) {
      if (i < points.length) {
        stars[i].formingTo = points[i];
      } else {
        stars[i].formingTo = null;
      }
    }
    
    state = 'forming';
    stateTimer = 0;
    
    // fade in phrase overlay text once stars have settled
    phraseEl.textContent = text;
    setTimeout(() => {
      phraseEl.style.color = 'rgba(220,225,240,0.75)';
    }, 4500);
  }
  
  function startDispersing() {
    for (const s of stars) {
      s.vx = (Math.random() - 0.5) * 0.35;
      s.vy = (Math.random() - 0.5) * 0.25;
      s.formingTo = null;
    }
    state = 'dispersing';
    stateTimer = 0;
    phraseEl.style.color = 'rgba(220,225,240,0)';
  }
  
  function startDrifting() {
    for (const s of stars) {
      s.vx = (Math.random() - 0.5) * 0.1;
      s.vy = (Math.random() - 0.5) * 0.07;
    }
    state = 'drifting';
    stateTimer = 0;
  }
  
  function animate(time) {
    const dt = time - lastFrameTime;
    lastFrameTime = time;
    drawStars(time);
    stateTimer += dt;
    
    // timings — slower forming + longer hold
    if (state === 'drifting' && stateTimer > 8000 + Math.random() * 4000) {
      startForming();
    } else if (state === 'forming' && stateTimer > 8000) {
      // hold the formed shape
      state = 'held';
      stateTimer = 0;
    } else if (state === 'held' && stateTimer > 5500) {
      startDispersing();
    } else if (state === 'dispersing' && stateTimer > 3500) {
      startDrifting();
    }
    
    requestAnimationFrame(animate);
  }
  
  setTimeout(() => {
    requestAnimationFrame((t) => {
      lastFrameTime = t;
      animate(t);
    });
  }, 800);
})();
</script>
</body>
</html>
